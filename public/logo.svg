<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Silent Reach">
  <!-- Pulse Mark: three concentric three-quarter arcs of decreasing radius, opening toward upper-right
       to suggest directional reach. A solid gold disc at center grounds the composition. -->
