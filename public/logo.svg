  <path d="M 32 14 A 18 18 0 1 1 14 32" stroke="#d4af37" stroke-width="1.25" stroke-opacity="0.5" stroke-linecap="round"/>
  <path d="M 32 22 A 10 10 0 1 1 22 32" stroke="#d4af37" stroke-width="1.5" stroke-opacity="0.85" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="4" fill="#d4af37"/>
</svg>
